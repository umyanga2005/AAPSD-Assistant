services:
  postgres:
    image: postgres:16-alpine
    container_name: aapsd-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-aapsd} -d ${POSTGRES_DB:-aapsd}']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: aapsd-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD:-aapsd_dev}']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  redisdata:
