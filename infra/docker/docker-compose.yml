version: '3.8'

services:
  web:
    build:
      context: ../../
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - '5173:80'
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - api
    networks:
      - aapsd_network

  api:
    build:
      context: ../../
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://aapsd_user:aapsd_pass@db:5432/aapsd_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "npm run db:migrate && npm start"
    networks:
      - aapsd_network

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=aapsd_user
      - POSTGRES_PASSWORD=aapsd_pass
      - POSTGRES_DB=aapsd_db
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aapsd_user -d aapsd_db']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - aapsd_network

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aapsd_network

volumes:
  db_data:

networks:
  aapsd_network:
    driver: bridge
