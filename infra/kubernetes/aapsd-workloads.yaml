apiVersion: v1
kind: Namespace
metadata:
  name: aapsd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: default
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: default
spec:
  selector:
    app: prometheus
  ports:
    - protocol: TCP
      port: 9095
      targetPort: 9090
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aapsd-redis
  namespace: default
  labels:
    app: aapsd-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aapsd-redis
  template:
    metadata:
      labels:
        app: aapsd-redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aapsd-api
  namespace: default
  labels:
    app: aapsd-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aapsd-api
  template:
    metadata:
      labels:
        app: aapsd-api
    spec:
      containers:
        - name: api
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aapsd-web
  namespace: default
  labels:
    app: aapsd-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aapsd-web
  template:
    metadata:
      labels:
        app: aapsd-web
    spec:
      containers:
        - name: web
          image: nginx:alpine
          ports:
            - containerPort: 80
