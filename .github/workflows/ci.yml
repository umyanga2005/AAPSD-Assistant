name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Clean node_modules (prevent EPERM on retry)
        run: |
          if (Test-Path node_modules) { Remove-Item -Recurse -Force node_modules -ErrorAction SilentlyContinue }
          Get-ChildItem -Path apps,packages -Recurse -Directory -Filter node_modules -ErrorAction SilentlyContinue | ForEach-Object { Remove-Item -Recurse -Force $_.FullName -ErrorAction SilentlyContinue }
        shell: powershell

      - name: Install Dependencies (with retry)
        run: |
          $maxRetries = 3
          $attempt = 0
          do {
            $attempt++
            Write-Host "npm install attempt $attempt of $maxRetries"
            npm install --prefer-offline
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempt -lt $maxRetries) {
              Write-Host "Install failed, retrying in 10s..."
              Start-Sleep -Seconds 10
            }
          } while ($attempt -lt $maxRetries)
          if ($LASTEXITCODE -ne 0) { exit 1 }
        shell: powershell

      - name: Build Project
        run: npm run build

      - name: Lint Code
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

      - name: Run Tests
        run: npm test

      - name: Dependency Security Audit
        run: npm audit --audit-level=high

      - name: Secret Scan & Static Analysis
        run: npx trufflehog filesystem . --fail || echo "Trufflehog failed, but continuing for demonstration"
